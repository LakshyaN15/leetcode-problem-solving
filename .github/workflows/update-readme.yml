name: Update READMEs

on:
  push:
    branches: [main]
    paths:
      - "Data Structures/**"
      - "Algorithms/**"
      - "Database/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build folder problem tables
        run: python scripts/update_folders.py

      - name: Update root README stats
        run: python scripts/update_readme.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: auto-update READMEs"
          git pull --rebase
          git push
