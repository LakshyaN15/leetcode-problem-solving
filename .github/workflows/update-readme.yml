name: Update READMEs

on:
  push:
    branches: [main]
    paths:
      - "Data Structures/**"
      - "Algorithms/**"
      - "SQL/**"
      - "scripts/**"
  workflow_dispatch:

# If LeetSync triggers several pushes quickly, don't run overlapping jobs.
concurrency:
  group: update-readmes
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build folder problem tables
        run: python scripts/update_folders.py

      - name: Update root README stats
        run: python scripts/update_readme.py

      - name: Commit & push (pull-rebase, retry on race)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing changed."
            exit 0
          fi
          git commit -m "chore: auto-update READMEs"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push race, retrying ($i)…"
            sleep 3
          done
          echo "Could not push after retries." && exit 1
